<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Buscador de países</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <h1>Buscador de países</h1>
    <p class="sub">Escribe el nombre de cualquier país en inglés</p>

    <div class="buscador">
      <input
        type="text"
        id="input"
        placeholder="Ej: Colombia, Japan, France..."
      />
      <button onclick="buscar()">Buscar</button>
    </div>

    <div id="resultado"></div>

    <script src="script.js"></script>
  </body>
</html>
